<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas Tree with Lights</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="title-container">
            <h1>Christmas Tree with Lights</h1>
            <div class="subtitle">Illuminate the tree by hovering over the lights</div>
        </div>
        
        <div class="tree-container">
            <div class="snow" id="snow"></div>
            <div class="tree">
                <div class="star-container">
                    <div class="star"></div>
                </div>
                <div id="lights-container"></div>
                <div class="trunk"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
